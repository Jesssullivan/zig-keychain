name: CI

on:
  push:
    branches: [main, 'jess/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false

      - name: Install libsecret (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libsecret-1-dev libglib2.0-dev

      - name: Build static library
        run: zig build -Doptimize=ReleaseFast

      - name: Run unit tests
        run: zig build test

      - name: Build C example
        run: zig build example

  autodoc:
    name: Autodoc
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: false
      - name: Generate autodoc
        run: zig build docs
      - name: Upload autodoc artifact
        uses: actions/upload-artifact@v4
        with:
          name: autodoc
          path: zig-out/docs/

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install "detect-secrets>=1.5"

      - name: Scan for secrets
        run: detect-secrets scan
